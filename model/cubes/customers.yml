cubes:
  - name: customers
    sql_table: customers

    dimensions:
      - name: customer_id
        sql: customer_id
        type: number
        primary_key: true

      - name: customer_name
        sql: customer_name
        type: string

      - name: city
        sql: city
        type: string

    measures:
      - name: count
        type: count
